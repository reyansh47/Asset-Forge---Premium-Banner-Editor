            e.stopPropagation();
            const layer = state.layers.find(l => l.id === id);
            if (layer) {
                layer.visible = !layer.visible;
                saveHistory();
                renderLayers();
                updateLayersPanel();
            }
        }

        function toggleLayerLock(id, e) {
            e.stopPropagation();
            const layer = state.layers.find(l => l.id === id);
            if (layer) {
                layer.locked = !layer.locked;
                saveHistory();
                renderLayers();
                updateLayersPanel();
                updateInspector();
            }
        }

        function moveLayerOrder(id, direction) {
            const idx = state.layers.findIndex(l => l.id === id);
            if (idx === -1) return;
            
            const targetIdx = idx + direction;
            if (targetIdx < 0 || targetIdx >= state.layers.length) return;

            // Swap positions
            const temp = state.layers[idx];
            state.layers[idx] = state.layers[targetIdx];
            state.layers[targetIdx] = temp;

            saveHistory();
            renderLayers();
            updateLayersPanel();
        }

        // ═══════════ UPLOAD & FILE UTILITIES ═══════════
        function handleImageUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            const tempImg = new Image();
            tempImg.src = url;
            tempImg.onload = () => {
                let w = tempImg.naturalWidth || 300;
                let h = tempImg.naturalHeight || 200;
                
                // Scale down logic
                const maxW = state.canvasWidth * 0.4;
                if (w > maxW) {
                    const scale = maxW / w;
                    w = maxW;
                    h = h * scale;
                }

                const id = 'l-u-' + Date.now();
                const imageLayer = {
                    id,
                    type: 'image',
                    name: file.name.substring(0, 15) || 'Image Layer',
                    src: url,
                    x: Math.round((state.canvasWidth - w) / 2),
                    y: Math.round((state.canvasHeight - h) / 2),
                    width: Math.round(w),
                    height: Math.round(h),
                    rotation: 0,
                    opacity: 1,
                    visible: true,
                    locked: false,
                    filters: {
                        brightness: 1,
                        contrast: 1,
                        saturate: 1,
                        blur: 0
                    }
                };

                state.layers.push(imageLayer);
                saveHistory();
                selectLayer(id);
                updateUploadsList();
            };
        }

        function updateUploadsList() {
            const listEl = document.getElementById('uploadsList');
            if (!listEl) return;
            
            const uploads = state.layers.filter(l => l.type === 'image');
            if (uploads.length === 0) {
                listEl.innerHTML = '<span style="font-size: 0.65rem; color: var(--royal-gray); font-style: italic;">No custom images uploaded yet.</span>';
                return;
            }

            listEl.innerHTML = uploads.map(layer => {
                return `
                    <div class="layer-item" onclick="selectLayer('${layer.id}')">
                        <div class="layer-item-left">
                            <img src="${layer.src}" style="width: 20px; height: 20px; border-radius:3px; object-fit:cover;">
                            <span>${layer.name}</span>
                        </div>
                        <div class="layer-item-right">
                            <button class="layer-action-btn" onclick="deleteLayer('${layer.id}')" title="Delete">×</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateLayerProperty(property, value) {
            const layer = state.layers.find(l => l.id === state.selectedId);
            if (layer) {
                layer[property] = value;
                renderLayers();
                
                // Do not record history for text input (too fast), only on finish
                if (property === 'name' || property === 'text') {
                    clearTimeout(window.layerTypingTimer);
                    window.layerTypingTimer = setTimeout(() => {
                        saveHistory();
                    }, 400);
                } else {
                    saveHistory();
                }
            }
        }

        function updateImageFilter(filterKey, value) {
            const layer = state.layers.find(l => l.id === state.selectedId);
            if (layer && layer.type === 'image') {
                layer.filters[filterKey] = value;
                renderLayers();
                
                // Update slider text
                updateInspector();

                clearTimeout(window.imgFilterTimer);
                window.imgFilterTimer = setTimeout(() => {
                    saveHistory();
                }, 300);
            }
        }

        function toggleLockSelected() {
            const layer = state.layers.find(l => l.id === state.selectedId);
            if (layer) {
                layer.locked = !layer.locked;
                saveHistory();
                renderLayers();
                updateLayersPanel();
                updateInspector();
            }
        }

        // ═══════════ PRESET LOADER ═══════════
        function loadPreset(key) {
            const data = TEMPLATES[key];
            if (!data) return;

            // Apply background properties
            state.background.src = data.bg;
            state.background.opacity = data.bgOpacity;
            state.background.zoom = data.bgZoom;
            state.background.x = data.bgX;
            state.background.y = data.bgY;
            state.background.blur = data.bgBlur;
            state.background.tintColor = data.bgTintColor;
            state.background.tintOpacity = data.bgTintOpacity;
            state.activeFilter = data.activeFilter || 'none';

            // Apply overlays
            state.overlays = JSON.parse(JSON.stringify(data.overlays));

            // Apply layers
            state.layers = JSON.parse(JSON.stringify(data.layers));
            state.selectedId = null;

            // Render
            renderCanvas();
            updateLayersPanel();
            updateInspector();
            
            // Rebuild active tab drawer
            renderDrawerContent(state.activeTab);
            
            showToast(`Loaded Template: ${key.toUpperCase()}`);
        }

        // ═══════════ DIMENSIONS & ASPECT RATIOS ═══════════
        function changeAspectRatio(ratio) {
            state.aspectRatio = ratio;
            const canvas = document.getElementById('bannerCanvas');
            
            // Clear ratio classes
            canvas.className = 'banner-canvas';
            
            if (ratio === 'x') {
                state.canvasWidth = 1500;
                state.canvasHeight = 500;
                canvas.classList.add('ratio-x');
            } else if (ratio === 'insta-square') {
                state.canvasWidth = 1080;
                state.canvasHeight = 1080;
                canvas.classList.add('ratio-insta-square');
            } else if (ratio === 'insta-portrait') {
                state.canvasWidth = 1080;
                state.canvasHeight = 1350;
                canvas.classList.add('ratio-insta-portrait');
            } else if (ratio === 'story') {
                state.canvasWidth = 1080;
                state.canvasHeight = 1920;
                canvas.classList.add('ratio-story');
            } else if (ratio === 'custom') {
                document.getElementById('customWidthInput').value = state.canvasWidth;
                document.getElementById('customHeightInput').value = state.canvasHeight;
                
                canvas.style.width = `${state.canvasWidth}px`;
                canvas.style.height = `${state.canvasHeight}px`;
            }
            
            if (ratio !== 'custom') {
                canvas.style.width = '';
                canvas.style.height = '';
            }

            document.getElementById('statusDimensions').innerText = `${state.canvasWidth} × ${state.canvasHeight} px`;

            saveHistory();
            renderCanvas();
            updateScaleUI();
            renderDrawerContent('canvas');
        }

        function changeCustomSize() {
            const w = parseInt(document.getElementById('customWidthInput').value) || 1200;
            const h = parseInt(document.getElementById('customHeightInput').value) || 800;

            state.canvasWidth = w;
            state.canvasHeight = h;
            
            const canvas = document.getElementById('bannerCanvas');
            canvas.style.width = `${w}px`;
            canvas.style.height = `${h}px`;

            document.getElementById('statusDimensions').innerText = `${w} × ${h} px`;
            
            saveHistory();

            updateScaleUI();

        // ═══════════ ZOOM CONTROLLER ═══════════
        function adjustZoom(amount) {
            state.zoom = Math.min(1.5, Math.max(0.1, state.zoom + amount));
            updateScaleUI();
        }

        function resetZoom() {
            // Find zoom that fits within screen height and width
            const viewHeight = document.getElementById('canvasArea').clientHeight - 100;
            const viewWidth = document.getElementById('canvasArea').clientWidth - 40;
            const ratioZoomH = viewHeight / state.canvasHeight;
            const ratioZoomW = viewWidth / state.canvasWidth;
            const ratioZoom = Math.min(ratioZoomH, ratioZoomW);
            state.zoom = Math.min(1.0, parseFloat(ratioZoom.toFixed(2)));
            updateScaleUI();
        }

        function updateScaleUI() {
            document.getElementById('zoomText').innerText = `${Math.round(state.zoom * 100)}%`;
            document.getElementById('canvasViewport').style.transform = `scale(${state.zoom})`;
        }

        // Reset all defaults
        function resetDefaults() {
            if (confirm('Reset canvas to default Core Power style? Any unsaved custom work will be cleared.')) {
                loadPreset('core');
                changeAspectRatio('x');
                state.zoom = 0.65;
                updateScaleUI();
                saveHistory();
            }
        }

        // ═══════════ HISTORY ENGINE (UNDO/REDO) ═══════════
        function saveHistory() {
            // Cut future redo states if a new operation was made
            if (state.historyIndex < state.history.length - 1) {
                state.history = state.history.slice(0, state.historyIndex + 1);
            }

            // Clone State deeply
            const stateClone = {
                canvasWidth: state.canvasWidth,
                canvasHeight: state.canvasHeight,
                aspectRatio: state.aspectRatio,
                background: JSON.parse(JSON.stringify(state.background)),
                overlays: JSON.parse(JSON.stringify(state.overlays)),
                layers: JSON.parse(JSON.stringify(state.layers)),
                activeFilter: state.activeFilter
            };

            state.history.push(stateClone);
            state.historyIndex++;

            // Limit history stack size to 30
            if (state.history.length > 30) {
                state.history.shift();
                state.historyIndex--;
            }

            updateHistoryButtons();
        }

        function undo() {
            if (state.historyIndex > 0) {
                state.historyIndex--;
                applyHistoryState(state.history[state.historyIndex]);
            }
        }

        function redo() {
            if (state.historyIndex < state.history.length - 1) {
                state.historyIndex++;
                applyHistoryState(state.history[state.historyIndex]);
            }
        }

        function applyHistoryState(hState) {
            state.canvasWidth = hState.canvasWidth;
            state.canvasHeight = hState.canvasHeight;
            state.aspectRatio = hState.aspectRatio;
            state.background = JSON.parse(JSON.stringify(hState.background));
            state.overlays = JSON.parse(JSON.stringify(hState.overlays));
            state.layers = JSON.parse(JSON.stringify(hState.layers));
            state.activeFilter = hState.activeFilter;

            // Restore aspect ratio visual wrapper styling
            const canvas = document.getElementById('bannerCanvas');
            canvas.className = 'banner-canvas';
            if (state.aspectRatio !== 'custom') {
                canvas.classList.add('ratio-' + state.aspectRatio);
                canvas.style.width = '';
                canvas.style.height = '';
            } else {
                canvas.style.width = `${state.canvasWidth}px`;
                canvas.style.height = `${state.canvasHeight}px`;
            }
            
            document.getElementById('statusDimensions').innerText = `${state.canvasWidth} × ${state.canvasHeight} px`;

            // Rerender
            renderCanvas();
            updateLayersPanel();
            updateInspector();
            updateHistoryButtons();
            
            // Re-render panels drawer if active
            renderDrawerContent(state.activeTab);
        }

        function updateHistoryButtons() {
            document.getElementById('btnUndo').disabled = state.historyIndex <= 0;
            document.getElementById('btnRedo').disabled = state.historyIndex >= state.history.length - 1;
        }

        // ═══════════ CUSTOM SAVED PRESETS ═══════════
        function saveCustomPreset() {
            const name = prompt("Enter a name for your custom style preset:");
            if (!name) return;

            const presetPayload = {
                bg: state.background.src,
                bgOpacity: state.background.opacity,
                bgZoom: state.background.zoom,
                bgX: state.background.x,
                bgY: state.background.y,
                bgBlur: state.background.blur,
                bgTintColor: state.background.tintColor,
                bgTintOpacity: state.background.tintOpacity,
                activeFilter: state.activeFilter,
                overlays: state.overlays,
                layers: state.layers
            };

            const customPresets = JSON.parse(localStorage.getItem('asset_forge_custom_presets') || '{}');
            customPresets[name] = presetPayload;
            localStorage.setItem('asset_forge_custom_presets', JSON.stringify(customPresets));

            loadCustomPresetsList();
            showToast(`Preset "${name}" Saved!`);
        }

        function loadCustomPresetsList() {
            const listDiv = document.getElementById('customPresetsList');
            if(!listDiv) return;
            listDiv.innerHTML = "";

            const customPresets = JSON.parse(localStorage.getItem('asset_forge_custom_presets') || '{}');
            const keys = Object.keys(customPresets);

            if (keys.length === 0) {
                listDiv.innerHTML = '<span style="font-size: 0.65rem; color: var(--royal-gray); font-style: italic;">No custom presets saved.</span>';
                return;
            }

            keys.forEach(key => {
                const row = document.createElement('div');
                row.style.display = 'flex';
                row.style.justify = 'space-between';
                row.style.alignItems = 'center';
                row.style.backgroundColor = 'rgba(255,255,255,0.03)';
                row.style.padding = '0.4rem 0.5rem';
                row.style.borderRadius = '4px';
                row.style.border = '1px solid var(--royal-border)';

                const label = document.createElement('span');
                label.innerText = key;
                label.style.fontSize = '0.68rem';
                label.style.color = '#ffffff';
                label.style.cursor = 'pointer';
                label.onclick = () => loadCustomPreset(key);

                const actions = document.createElement('div');
                actions.style.display = 'flex';
                actions.style.gap = '0.3rem';

                const deleteBtn = document.createElement('button');
                deleteBtn.innerText = "×";
                deleteBtn.className = "btn";
                deleteBtn.style.padding = '0.1rem 0.35rem';
                deleteBtn.style.fontSize = '0.62rem';
                deleteBtn.style.color = '#ff6b6b';
                deleteBtn.style.borderColor = 'rgba(255,107,107,0.15)';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteCustomPreset(key);
                };

                actions.appendChild(deleteBtn);
                row.appendChild(label);
                row.appendChild(actions);
                listDiv.appendChild(row);
            });
        }

        function loadCustomPreset(key) {
            const customPresets = JSON.parse(localStorage.getItem('asset_forge_custom_presets') || '{}');
            const data = customPresets[key];
            if (!data) return;

            state.background.src = data.bg;
            state.background.opacity = data.bgOpacity;
            state.background.zoom = data.bgZoom;
            state.background.x = data.bgX;
            state.background.y = data.bgY;
            state.background.blur = data.bgBlur;
            state.background.tintColor = data.bgTintColor || "#000000";
            state.background.tintOpacity = data.bgTintOpacity || 0.0;
            state.activeFilter = data.activeFilter || 'none';

            state.overlays = JSON.parse(JSON.stringify(data.overlays));
            state.layers = JSON.parse(JSON.stringify(data.layers));
            state.selectedId = null;

            renderCanvas();
            updateLayersPanel();
            updateInspector();
            renderDrawerContent(state.activeTab);
            
            showToast(`Loaded Custom Preset: ${key}`);
        }

        function deleteCustomPreset(key) {
            if (confirm(`Delete preset "${key}"?`)) {
                const customPresets = JSON.parse(localStorage.getItem('asset_forge_custom_presets') || '{}');
                delete customPresets[key];
                localStorage.setItem('asset_forge_custom_presets', JSON.stringify(customPresets));
                loadCustomPresetsList();
                showToast(`Preset deleted: ${key}`);
            }
        }

        // Keyboard triggers
        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                const activeEl = document.activeElement;
                const isTyping = activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA' || activeEl.getAttribute('contenteditable') === 'true';

                // Undo
                if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                    if (!isTyping) {
                        e.preventDefault();
                        undo();
                    }
                }
                // Redo
                if ((e.ctrlKey || e.metaKey) && e.key === 'y') {
                    if (!isTyping) {
                        e.preventDefault();
                        redo();
                    }
                }
                // Delete selected layer
                if (e.key === 'Delete' || e.key === 'Backspace') {
                    if (!isTyping && state.selectedId) {
                        e.preventDefault();
                        deleteLayer(state.selectedId);
                    }
                }
                // Duplicate active layer
                if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
                    if (!isTyping && state.selectedId) {
                        e.preventDefault();
                        duplicateLayer(state.selectedId);
                    }
                }
                // Arrow key nudging (1px, or 10px with Shift)
                const nudgeKeys = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'];
                if (nudgeKeys.includes(e.key) && !isTyping && state.selectedId) {
                    e.preventDefault();
                    const step = e.shiftKey ? 10 : 1;
                    const layer = state.layers.find(l => l.id === state.selectedId);
                    if (layer && !layer.locked) {
                        if (e.key === 'ArrowLeft')  layer.x -= step;
                        if (e.key === 'ArrowRight') layer.x += step;
                        if (e.key === 'ArrowUp')    layer.y -= step;
                        if (e.key === 'ArrowDown')  layer.y += step;
                        renderLayers();
                        updateInspector();
                        clearTimeout(window.nudgeTimer);
                        window.nudgeTimer = setTimeout(() => saveHistory(), 300);
                    }
                }
                // Esc deselect
                if (e.key === 'Escape') {
                    state.selectedId = null;
                    renderLayers();
                    updateLayersPanel();
                    updateInspector();
                }
            });
        }

        // ═══════════ SAVE / LOAD PROJECT (JSON) ═══════════
        function saveProjectJSON() {
            const projectData = {
                version: '1.0',
                savedAt: new Date().toISOString(),
                canvasWidth: state.canvasWidth,
                canvasHeight: state.canvasHeight,
                aspectRatio: state.aspectRatio,
                background: JSON.parse(JSON.stringify(state.background)),
                overlays: JSON.parse(JSON.stringify(state.overlays)),
                activeFilter: state.activeFilter,
                exportScale: state.exportScale,
                exportFormat: state.exportFormat,
                exportQuality: state.exportQuality,
                layers: JSON.parse(JSON.stringify(state.layers))
            };
            const blob = new Blob([JSON.stringify(projectData, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `asset-forge-project-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(a.href);
            showToast('Project saved!');
        }

        function loadProjectJSON() {
            document.getElementById('projectFileInput').click();
        }

        function handleProjectFileLoad(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    // Restore state
                    state.canvasWidth  = data.canvasWidth  || 1500;
                    state.canvasHeight = data.canvasHeight || 500;
                    state.aspectRatio  = data.aspectRatio  || 'x';
                    state.background   = data.background;
                    state.overlays     = data.overlays;
                    state.activeFilter = data.activeFilter || 'none';
                    state.exportScale  = data.exportScale  || 2;
                    state.exportFormat = data.exportFormat || 'png';
                    state.exportQuality = data.exportQuality || 0.95;
                    state.layers       = data.layers || [];
                    state.selectedId   = null;
                    // Apply canvas size
                    const canvas = document.getElementById('bannerCanvas');
                    canvas.style.width  = state.canvasWidth  + 'px';
                    canvas.style.height = state.canvasHeight + 'px';
                    saveHistory();
                    renderCanvas();
                    updateLayersPanel();
                    updateInspector();
                    updateAlignToolbar();
                    renderDrawerContent(state.activeTab);
                    showToast('Project loaded successfully!');
                } catch(err) {
                    showToast('Error: Invalid project file.');
                    console.error(err);
                }
            };
            reader.readAsText(file);
            // Reset input so the same file can be re-opened
            event.target.value = '';
        }
        function showToast(msg) {
            const toast = document.getElementById('statusToast');
            document.getElementById('toastMsg').innerText = msg;
            toast.style.display = 'flex';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // Helper random ID generator
        function generateId() {
            return 'layer-' + Math.random().toString(36).substr(2, 9);
        }

        // ═══════════ EXPORT IMAGES SYSTEM ═══════════
        function updateExportProperty(property, value) {
            state[property] = value;
            renderDrawerContent('export');
        }

        // Copy to clipboard using modern Clipboard API
        function copyToClipboard() {
            const canvas = document.getElementById('bannerCanvas');
            showToast("Generating image for clipboard...");

            // Temporarily select none and reset scaling transform for html2canvas
            const lastSelected = state.selectedId;
            state.selectedId = null;
            renderLayers();

            const lastTransform = document.getElementById('canvasViewport').style.transform;
            document.getElementById('canvasViewport').style.transform = 'scale(1)';

            html2canvas(canvas, {
                useCORS: true,
                allowTaint: true,
                scale: state.exportScale,
                backgroundColor: '#0a0a0a',
                logging: false,
                scrollX: 0,
                scrollY: 0
            }).then(renderedCanvas => {
                // Restore selection and zoom scale
                state.selectedId = lastSelected;
                renderLayers();
                document.getElementById('canvasViewport').style.transform = lastTransform;

                const format = state.exportFormat === 'jpg' ? 'image/jpeg' : 'image/png';
                renderedCanvas.toBlob(blob => {
                    if (!blob) {
                        showToast("Failed to create image blob!");
                        return;
                    }
                    
                    try {
                        navigator.clipboard.write([
                            new ClipboardItem({
                                [blob.type]: blob
                            })
                        ]).then(() => {
                            showToast("Copied Image to Clipboard!");
                        }).catch(err => {
                            showToast("Clipboard write permission blocked!");
                            console.error(err);
                        });
                    } catch(e) {
                        showToast("Clipboard write not supported or blocked.");
                        console.error(e);
                    }
                }, format, state.exportQuality);
            }).catch(err => {
                // Restore selection and zoom scale
                state.selectedId = lastSelected;
                renderLayers();
                document.getElementById('canvasViewport').style.transform = lastTransform;
                
                showToast("Generation Error!");
                console.error("Clipboard failure:", err);
            });
        }

        function exportBanner() {
            const canvas = document.getElementById('bannerCanvas');
            const formatStr = state.exportFormat.toUpperCase();
            showToast(`Exporting High-Res ${formatStr}...`);

            // Temporarily select none and reset scaling transform for html2canvas
            const lastSelected = state.selectedId;
            state.selectedId = null;
            renderLayers();

            const lastTransform = document.getElementById('canvasViewport').style.transform;
            document.getElementById('canvasViewport').style.transform = 'scale(1)';

            // html2canvas rendering payload
            html2canvas(canvas, {
                useCORS: true,
                allowTaint: true,
                scale: state.exportScale, // 1x, 2x, 3x DPI scaling
                backgroundColor: '#0a0a0a',
                logging: false,
                scrollX: 0,
                scrollY: 0
            }).then(renderedCanvas => {
                // Restore selection and zoom scale
                state.selectedId = lastSelected;
                renderLayers();
                document.getElementById('canvasViewport').style.transform = lastTransform;

                const extension = state.exportFormat;
                const mimeType = extension === 'jpg' ? 'image/jpeg' : 'image/png';

                const link = document.createElement('a');
                link.download = `sovereign_asset_${state.aspectRatio}_${Date.now()}.${extension}`;
                link.href = renderedCanvas.toDataURL(mimeType, state.exportQuality);
                link.click();
                
                showToast("Download Complete!");
            }).catch(err => {
                // Restore selection and zoom scale
                state.selectedId = lastSelected;
                renderLayers();
                document.getElementById('canvasViewport').style.transform = lastTransform;
                
                showToast("Export Error!");
                console.error("Export failure:", err);
            });
        }
    </script>
</body>
